name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Rust 后端（release 构建 + 单测）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: cargo test
        working-directory: server
        run: cargo test --locked
      - name: cargo build --release
        working-directory: server
        run: cargo build --release --locked

  frontend:
    name: 前端构建（npm ci + vite build）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: 构建
        working-directory: ui
        run: |
          npm ci --no-audit --no-fund
          npm run build

  docker:
    name: Docker 镜像构建 + 容器冒烟
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: docker build（多阶段全量）
        run: docker build -t lzc-turtle:ci .
      - name: 启动容器（挂载配置目录 + 映射端口 + AUTH_MODE=dev）
        run: |
          mkdir -p "$PWD/ci-config"
          docker run -d --name turtle -p 8000:8000 \
            -e AUTH_MODE=dev \
            -v "$PWD/ci-config:/config" \
            lzc-turtle:ci
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health && break || sleep 1
          done
      - name: 容器冒烟测试
        run: |
          set -e
          echo "--- me 应含 auth_mode:dev ---"
          curl -sf http://localhost:8000/api/me | grep -q '"auth_mode":"dev"' && echo PASS
          echo "--- SPA 与静态资源 ---"
          curl -sf -o /dev/null -w "/ -> %{http_code}\n" http://localhost:8000/
          curl -sf -o /dev/null -w "/deep/x -> %{http_code}\n" http://localhost:8000/deep/x
          JS=$(curl -s http://localhost:8000/ | grep -o '/assets/[^"]*\.js' | head -1)
          curl -sf -o /dev/null -w "$JS -> %{http_code}\n" "http://localhost:8000$JS"
          echo "--- CRUD 全链路 ---"
          ID=$(curl -sf -X POST http://localhost:8000/api/drawings \
            -H 'content-type: application/json' \
            -d '{"title":"五角星","code":"REPEAT 5 [FD 200 RT 144]"}' | grep -o '"id":[0-9]*' | cut -d: -f2)
          curl -sf "http://localhost:8000/api/drawings/$ID" | grep -q "五角星" && echo "GET PASS"
          curl -sf -X PUT "http://localhost:8000/api/drawings/$ID" \
            -H 'content-type: application/json' -d '{"title":"花"}' | grep -q '"ok":true' && echo "PUT PASS"
          curl -sf -X DELETE "http://localhost:8000/api/drawings/$ID" | grep -q '"ok":true' && echo "DELETE PASS"
          echo "--- API JSON 404 ---"
          curl -s http://localhost:8000/api/nope | grep -q '"error"' && echo "404 PASS"
          echo "--- SQLite 落盘到挂载的配置目录 ---"
          test -f "$PWD/ci-config/turtle.db" && echo "turtle.db PASS"
      - name: 容器日志（失败排查用）
        if: always()
        run: docker logs turtle 2>&1 | tail -20

  lzc-package:
    name: 懒猫打包链路（build.sh + musl 静态验证）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: 安装 musl 工具链（ring/rusqlite 需要 musl-gcc）
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: 运行 deploy/build.sh（前端构建 + musl 静态后端 + contentdir 归置）
        run: bash deploy/build.sh
      - name: 验证 contentdir 布局与静态链接
        run: |
          set -e
          test -f build-out/turtle-server
          test -f build-out/dist/index.html
          file build-out/turtle-server
          file build-out/turtle-server | grep -q "statically linked" && echo "STATIC PASS"
          ls -la build-out build-out/dist
